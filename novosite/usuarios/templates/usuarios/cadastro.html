{% extends 'usuarios/base.html' %}
{% load static %}

{% block conteudo %}

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 mx-auto">
            <div class="card login-card shadow-lg border-0 my-5">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <img
                            src="{% static 'img/logo2.png' %}"
                            alt="Logo Inventariar"
                            width="150"
                            class="logo-sistema"
                        >
                        <h5 class="mt-3 text-secondary">Cadastro</h5>
                    </div>

                    <form action="{% url 'cadastro' %}" method="POST">
                        {% csrf_token %}

                        <div class="form-floating mb-3">
                            <input
                                type="text"
                                class="form-control"
                                id="username"
                                name="nome"
                                placeholder="Nome Completo"
                                required
                            >
                            <label for="username">Nome Completo</label>
                        </div>

                    <div class="form-floating mb-3">
                        <input
                            type="email"
                            class="form-control"
                            id="useremail"
                            name="email"
                            placeholder="name@example.com"
                            required
                        >
                        <label for="useremail">E-mail</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input
                            type="password"
                            class="form-control"
                            id="userpassword"
                            name="senha"
                            placeholder="Senha"
                            required
                        >
                        <label for="userpassword">Senha</label>
                    </div>

                    <div class="d-grid">
                        <button class="btn btn-primary text-white" type="submit">Cadastrar</button>
                    </div>

                    <hr>

                    <div class="text-center">
                        <a href="{% url 'login' %}">Voltar para o login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
