{% load static %}

<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <title>Cadastro - IventariAR</title>

</head>

<body class="bg-light">

<div class="container">

    <div class="row">

        <div class="col-sm-9 col-md-7 col-lg-5 mx-auto">

            <div class="card border-0 shadow rounded-3 my-5">

              <div class="text-center mb-4">

              <img
                  src="{% static 'img/logo2.png' %}"
                  alt="Logo Inventariar"
                  width="150"
                  class="logo-sistema"
              >

              <h5 class="mt-3 text-secondary">

              Cadastro

              </h5>

              </div>

                    <form action="{% url 'cadastro' %}" method="POST">

                        {% csrf_token %}

                        <div class="form-floating mb-3">

                            <input

                                type="text"

                                class="form-control"

                                id="username"

                                name="nome"

                                placeholder="Nome Completo"

                                required

                            >

                            <label for="username">

                                Nome Completo

                            </label>

                        </div>

                        <div class="form-floating mb-3">

                            <input

                                type="email"

                                class="form-control"

                                id="useremail"

                                name="email"

                                placeholder="name@example.com"

                                required

                            >

                            <label for="useremail">

                                E-mail

                            </label>

                        </div>

                        <div class="form-floating mb-3">

                            <input

                                type="password"

                                class="form-control"

                                id="userpassword"

                                name="senha"

                                placeholder="Senha"

                                required

                            >

                            <label for="userpassword">

                                Senha

                            </label>

                        </div>

                        <div class="d-grid">

                            <button

                                class="btn btn-success"

                                type="submit"

                            >

                                Cadastrar

                            </button>

                        </div>

                        <hr>

                        <div class="text-center">

                            <a href="{% url 'login' %}">

                                Voltar para o login

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
