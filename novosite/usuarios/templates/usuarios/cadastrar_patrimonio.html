{% extends 'usuarios/base.html' %}

{% block conteudo %}

<div class="container">

    <h2>Cadastrar Patrimônio</h2>

    <hr>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label>Número do Tombamento</label>

            <input type="text"
                   class="form-control"
                   name="tombamento"
                   required>

        </div>

        <div class="mb-3">

            <label>Nome do Bem</label>

            <input type="text"
                   class="form-control"
                   name="nome"
                   required>

        </div>

        <div class="mb-3">

            <label>Categoria</label>

            <input type="text"
                   class="form-control"
                   name="categoria"
                   required>

        </div>

        <div class="mb-3">

            <label>Localização</label>

            <input type="text"
                   class="form-control"
                   name="localizacao"
                   required>

        </div>

        <div class="mb-3">

            <label>Responsável</label>

            <input type="text"
                   class="form-control"
                   name="responsavel"
                   required>

        </div>

        <div class="mb-3">

            <label>Data de Aquisição</label>

            <input type="date"
                   class="form-control"
                   name="data"
                   required>

        </div>

        <div class="mb-3">

            <label>Valor (R$)</label>

            <input type="number"
                   step="0.01"
                   class="form-control"
                   name="valor"
                   required>

        </div>

        <div class="mb-3">

            <label>Status</label>

            <select class="form-select" name="status">

                <option value="Em uso">

                    Em uso

                </option>

                <option value="Manutenção">

                    Manutenção

                </option>

                <option value="Inativo">

                    Inativo

                </option>

            </select>

        </div>

        <button class="btn btn-success">

            Salvar Patrimônio

        </button>

    </form>

</div>

{% endblock %}
