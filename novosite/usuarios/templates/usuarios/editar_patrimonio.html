{% extends 'usuarios/base.html' %}

{% block conteudo %}

<h2>Editar Patrimônio</h2>

<hr>

<form method="POST">

    {% csrf_token %}

    <div class="mb-3">

        <label>Número do Tombamento</label>

        <input type="text"
               class="form-control"
               name="tombamento"
               value="{{ patrimonio.numero_tombamento }}">

    </div>

    <div class="mb-3">

        <label>Nome</label>

        <input type="text"
               class="form-control"
               name="nome"
               value="{{ patrimonio.nome }}">

    </div>

    <div class="mb-3">

        <label>Categoria</label>

        <input type="text"
               class="form-control"
               name="categoria"
               value="{{ patrimonio.categoria }}">

    </div>

    <div class="mb-3">

        <label>Localização</label>

        <input type="text"
               class="form-control"
               name="localizacao"
               value="{{ patrimonio.localizacao }}">

    </div>

    <div class="mb-3">

        <label>Responsável</label>

        <input type="text"
               class="form-control"
               name="responsavel"
               value="{{ patrimonio.responsavel }}">

    </div>

    <div class="mb-3">

        <label>Data de Aquisição</label>

        <input type="date"
               class="form-control"
               name="data"
               value="{{ patrimonio.data_aquisicao|date:'Y-m-d' }}">

    </div>

    <div class="mb-3">

        <label>Valor</label>

        <input type="number"
               step="0.01"
               class="form-control"
               name="valor"
               value="{{ patrimonio.valor }}">

    </div>

    <div class="mb-3">

        <label>Status</label>

        <select class="form-select" name="status">

            <option value="Em uso">Em uso</option>

            <option value="Manutenção">Manutenção</option>

            <option value="Inativo">Inativo</option>

        </select>

    </div>

    <button class="btn btn-primary">

        Salvar Alterações

    </button>

</form>

{% endblock %}
